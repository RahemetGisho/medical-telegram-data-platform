version: 2

sources:
  - name: processed
    description: "Processed outputs generated by the computer vision pipeline."

    schema: processed

    tables:
      - name: image_detections
        description: "YOLO object detection results extracted from Telegram images."

        columns:
          - name: message_id
            description: "Telegram message associated with the analyzed image."

          - name: image_path
            description: "Path to the processed image."

          - name: channel_name
            description: "Telegram channel containing the image."

          - name: image_category
            description: "High-level image classification."

          - name: detection_count
            description: "Number of detected objects."

          - name: detected_objects
            description: "Comma-separated list of detected object classes."

          - name: processed_at
            description: "Timestamp when YOLO inference finished."
