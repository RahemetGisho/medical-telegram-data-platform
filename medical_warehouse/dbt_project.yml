# Name your project! Project names should be lowercase and use underscores as spaces.
name: "medical_warehouse"
version: "1.0.0"
config-version: 2

# This sets the `raw-paths` macro to apply globally.
# See docs/source/docs/building-a-dbt-project/docs-and-descriptions.md
model-paths: ["models"]
analysis-paths: ["analysis"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target" # directory which will store compiled SQL files
clean-targets: # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/ directory
# as tables. These settings can be overridden in the individual model properties
# (see my_first_dbt_model.sql and my_second_dbt_model.sql for more information).
models:
  medical_warehouse:
    staging:
      +schema: staging
      +materialized: view
      +tags: ["staging"]
      +meta:
        owner: "analytics_team"
        frequency: "daily"

    marts:
      +schema: marts
      +materialized: table
      +tags: ["marts", "production"]
      +meta:
        owner: "analytics_team"
        frequency: "daily"
        access: "public"

# Seed configurations
seeds:
  medical_warehouse:
    +quote_columns: false

# Variables
vars:
  # Date for snapshot/incremental loads
  start_date: "2024-01-01"

  # Thresholds for data quality
  min_message_length: 1
  max_views_outlier: 100000
  max_forwards_outlier: 50000

# Require dbt version >= 1.0.0
require-dbt-version: [">=1.5.0", "<2.0.0"]

# Profile target
profile: "medical_warehouse"

# Quoting behavior
quoting:
  identifier: false
  schema: false
